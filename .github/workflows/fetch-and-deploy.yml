# .github/workflows/fetch-and-deploy.yml
name: Fetch RSS & Deploy

on:
  # Run every 30 minutes
  schedule:
    - cron: '*/30 * * * *'

  # Allow manual trigger
  workflow_dispatch:

  # Also run on push to main
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.142.0

    steps:
      # --- 1. Checkout repo ---
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 2. Setup Python ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # --- 3. Fetch RSS feeds ---
      - name: Fetch RSS and generate articles
        run: python scripts/fetch_rss.py

      # --- 4. Commit new articles to repo ---
      - name: Commit new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ data/seen_articles.json
          git diff --staged --quiet || git commit -m "📰 Update news articles $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      # --- 5. Install Hugo ---
      - name: Install Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb
      # --- 5.5. Fix any broken frontmatter URLs before build ---
      - name: Fix broken frontmatter URLs
        run: python scripts/fix_frontmatter.py
      # --- 6. Build with Hugo ---
      - name: Build site
        run: hugo --minify --baseURL "https://techukr.github.io/"

      # --- 7. Run Pagefind indexing ---
      - name: Index with Pagefind
        run: npx -y pagefind --site public

      # --- 8. Upload artifact ---
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # --- Deploy to GitHub Pages ---
  deploy:
    needs: fetch-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4