{{ define "main" }}
<div class="layout">
  <section class="articles">
    <h2>Latest News</h2>
    {{ range first 50 (where .Site.RegularPages "Section" "news") }}
    <article class="card">
      <div class="card-meta">
        <span class="source">{{ .Params.source_name }}</span>
        <span class="time">{{ .Params.time_ago }}</span>
      </div>
      <h3><a href="{{ .Params.external_url }}" target="_blank" rel="noopener">{{ .Title }}</a></h3>
      <div class="card-cats">
        {{ range .Params.categories }}
        <a href="{{ "/categories/" | relURL }}{{ . | urlize }}/" class="tag">{{ . }}</a>
        {{ end }}
      </div>
    </article>
    {{ end }}
  </section>
  {{ partial "sidebar.html" . }}
</div>
{{ end }}
