{{ if $.Site.Params.adsenseId }}
<div class="ad-slot ad-{{ .format }}">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="{{ $.Site.Params.adsenseId }}"
    data-ad-slot="{{ .slot }}"
    data-ad-format="{{ if eq .format "horizontal" }}horizontal{{ else if eq .format "vertical" }}vertical{{ else }}fluid{{ end }}"
    data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{{ end }}
