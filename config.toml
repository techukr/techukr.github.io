baseURL = "https://techukr.github.io/"
languageCode = "en-us"
title = "MyNewsNow"
theme = ""

# Pagination
paginate = 50

# Taxonomy (categories)
[taxonomies]
  category = "categories"

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

# RSS settings
[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "feed"

# JSON output for Pagefind / client-side features
[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"

# Menu items (sidebar categories)
[[menu.main]]
  name = "All News"
  url = "/news/"
  weight = 1

[[menu.main]]
  name = "UK"
  url = "/categories/uk/"
  weight = 2

